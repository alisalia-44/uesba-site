<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Admin - UESBA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .form-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }

        .form-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .message {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .error { background: #fadbd8; color: #c0392b; border-left: 4px solid #c0392b; }
        .success { background: #d5f4e6; color: #27ae60; border-left: 4px solid #27ae60; }

        .message.show { display: block; }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        button:active { transform: translateY(0); }

        .link-text {
            text-align: center;
            font-size: 13px;
            color: #666;
        }

        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
        }

        .link-text a:hover { text-decoration: underline; }

        @media (max-width: 500px) {
            .form-container { padding: 30px 20px; }
            .form-header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>🔐 Créer un compte</h1>
            <p>Admin UESBA</p>
        </div>

        <div class="message error" id="errorMsg"></div>
        <div class="message success" id="successMsg"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" placeholder="Votre prénom" required>
            </div>

            <div class="form-group">
                <label for="name">Nom</label>
                <input type="text" id="name" placeholder="Votre nom" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="votre@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="Min. 8 caractères" required minlength="8">
            </div>

            <button type="submit">Créer un compte</button>
        </form>

        <div class="link-text">
            Compte existant ? <a href="login.html">Se connecter</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const prenom = document.getElementById('prenom').value.trim();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            // Validation côté client
            if (!prenom || !name) {
                errorMsg.textContent = '❌ Veuillez remplir tous les champs';
                errorMsg.classList.add('show');
                return;
            }

            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                errorMsg.textContent = '❌ Email invalide';
                errorMsg.classList.add('show');
                return;
            }

            if (password.length < 8) {
                errorMsg.textContent = '❌ Le mot de passe doit contenir au moins 8 caractères';
                errorMsg.classList.add('show');
                return;
            }

            try {
                // Appel API vers votre backend Laravel
                const response = await fetch('http://votre-api.com/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prenom, name, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorMsg.textContent = '❌ ' + (data.message || 'Erreur lors de l\'inscription');
                    errorMsg.classList.add('show');
                    return;
                }

                localStorage.setItem('uesba_token', data.token);
                localStorage.setItem('uesba_user', JSON.stringify(data.user));
                successMsg.textContent = '✅ Compte créé! Redirection...';
                successMsg.classList.add('show');

                setTimeout(() => window.location.href = 'admin.html', 1500);
            } catch (error) {
                errorMsg.textContent = '❌ Erreur de connexion au serveur';
                errorMsg.classList.add('show');
                console.error('Erreur:', error);
            }
        });

        // Redirect if already logged in
        if (localStorage.getItem('uesba_token')) {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
