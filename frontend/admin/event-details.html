<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails Événement - Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0066cc, #0052a3);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 40px;
        }

        .form-section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 300px;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, #0066cc, #0052a3);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.4);
        }

        .btn-secondary {
            padding: 12px 24px;
            background: #f0f0f0;
            color: #333;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: white;
            border-color: #0066cc;
            color: #0066cc;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .content {
                padding: 20px;
            }

            .two-columns {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Détails de l'Événement</h1>
            <button class="btn-close" onclick="window.close()">Fermer</button>
        </div>

        <div class="content">
            <div class="success-message" id="successMessage">✓ Modifications enregistrées avec succès!</div>
            <div class="error-message" id="errorMessage"></div>

            <form id="eventDetailsForm" onsubmit="saveDetails(event)">
                <div class="form-section">
                    <h2>Informations Événement</h2>
                    <div class="two-columns">
                        <div class="form-group">
                            <label for="eventTitle">Titre</label>
                            <input type="text" id="eventTitle" readonly>
                        </div>
                        <div class="form-group">
                            <label for="eventDate">Date</label>
                            <input type="date" id="eventDate" readonly>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="eventLocation">Lieu</label>
                        <input type="text" id="eventLocation" readonly>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Contenu Détaillé de la Page</h2>
                    <div class="form-group">
                        <label for="eventContent">Contenu complet</label>
                        <textarea id="eventContent" placeholder="Entrez le contenu détaillé de l'événement..."></textarea>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-primary">💾 Enregistrer</button>
                    <button type="button" class="btn-secondary" onclick="window.close()">Annuler</button>
                </div>
            </form>
            
        </div>
        
    </div>
    <div class="action-buttons">
                        <a href="admin.html#events-section" class="btn-primary">Retour</a>
                    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = parseInt(urlParams.get('id'));

        window.addEventListener('load', function() {
            loadEventData();
        });

        function loadEventData() {
            const adminData = JSON.parse(localStorage.getItem('adminData')) || {};
            const event = adminData.events?.find(e => e.id === eventId);

            if (event) {
                document.getElementById('eventTitle').value = event.title || '';
                document.getElementById('eventDate').value = event.date || '';
                document.getElementById('eventLocation').value = event.location || '';
                document.getElementById('eventContent').value = event.detailedContent || '';
            } else {
                document.getElementById('errorMessage').textContent = 'Événement non trouvé';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function saveDetails(e) {
            e.preventDefault();

            const adminData = JSON.parse(localStorage.getItem('adminData')) || {};
            const eventIndex = adminData.events?.findIndex(e => e.id === eventId);

            if (eventIndex !== undefined && eventIndex !== -1) {
                adminData.events[eventIndex].detailedContent = document.getElementById('eventContent').value;
                localStorage.setItem('adminData', JSON.stringify(adminData));

                const successMessage = document.getElementById('successMessage');
                successMessage.style.display = 'block';
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
