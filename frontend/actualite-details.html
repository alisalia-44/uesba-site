<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails Actualité - UESBA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header">
        <div class="container">
            <a href="index.html">UESBA</a>
        </div>
    </header>
    <main class="container" style="padding: 2rem 1rem; max-width: 900px;">
        <button onclick="window.history.back()" class="back-btn">← Retour</button>
        <div id="news-detail" style="margin-top:1rem;"></div>
    </main>

    <script>
        (async function(){
            function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":"&#39;",'"':'&quot;'})[c]); }
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const container = document.getElementById('news-detail');
            if(!id){ container.innerHTML = '<p>Identifiant d\'actualité manquant.</p>'; return; }

            try{
                let article = null;
                if(window.apiService && window.apiService.getActualiteDetail){
                    const res = await window.apiService.getActualiteDetail(id);
                    if(res && res.success && res.data){
                        article = res.data.actualite || res.data.actualite || res.data || null;
                        if(article && article.data && Array.isArray(article.data)) article = article.data[0];
                    }
                }

                if(!article){
                    try{
                        let resp = await fetch('http://127.0.0.1:8000/api/actualite/' + encodeURIComponent(id));
                        if(!resp.ok){ resp = await fetch('http://127.0.0.1:8000/api/actualite/' + encodeURIComponent(id), { method: 'POST' }); }
                        if(resp && resp.ok){ const json = await resp.json().catch(()=>null); if(json) article = json.actualite || json.data || json; }
                    }catch(e){ console.error('detail fetch fallback failed', e); }
                }

                if(!article){
                    const data = JSON.parse(localStorage.getItem('adminData')||'{}');
                    const news = data.news || [];
                    article = news.find(x=> String(x.id)===String(id)) || news.find(x=> String(x.ID)===String(id));
                }

                if(!article){ container.innerHTML = '<p>Actualité introuvable.</p>'; return; }

                const title = escapeHtml(article.titre || article.title || article.nom || '');
                const date = escapeHtml(article.date || article.created_at || '');
                const content = escapeHtml(article.contenu || article.content || article.description || '');
                const photo = escapeHtml(article.photo || article.image || 'images/img.jpeg');

                container.innerHTML = `
                    <article style="background:#fff;padding:1.5rem;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,0.08)">
                        <img src="${photo}" alt="${title}" style="width:100%;height:380px;object-fit:cover;border-radius:8px;">
                        <h1 style="margin-top:1rem">${title}</h1>
                        <p style="color:#666;margin-bottom:0.5rem">${date}</p>
                        <div style="white-space:pre-wrap;margin-top:1rem;color:#333">${content}</div>
                    </article>
                `;
            }catch(err){ console.error(err); container.innerHTML = '<p>Erreur lors du chargement de l\'actualité.</p>'; }
        })();
    </script>
</body>
</html>
